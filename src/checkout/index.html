<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/checkout.js"></script>
  </head>

  <body>
    <header id="main-header" class="divider"></header>

    <main class="divider">
      <section class="checkout">
        <h2>Review &amp; Place your Order</h2>
        <div class="checkout__wrapper">
          <form id="checkout-form" novalidate>
            <fieldset class="checkout__fieldset">
              <legend>Customer Name</legend>
              <div class="checkout__row">
                <label>First Name <input type="text" name="fname" required /></label>
                <label>Last Name <input type="text" name="lname" required /></label>
              </div>
            </fieldset>

            <fieldset class="checkout__fieldset">
              <legend>Address</legend>
              <label class="checkout__full">Street Address <input type="text" name="street" required /></label>
              <div class="checkout__row checkout__row--3">
                <label>City <input type="text" name="city" required /></label>
                <label>State <input type="text" name="state" required /></label>
                <label>Zip Code <input type="text" id="zip" name="zip" required /></label>
              </div>
            </fieldset>

            <fieldset class="checkout__fieldset">
              <legend>Payment</legend>
              <div class="checkout__row checkout__row--payment">
                <label class="checkout__span2">Credit Card Number <input type="text" name="cardNumber" required /></label>
                <label>Expiration <input type="text" name="expiration" placeholder="MM/YY" required /></label>
                <label>CVV <input type="text" name="code" required /></label>
              </div>
            </fieldset>

            <button type="submit" class="button-primary">Place Order</button>
          </form>

          <aside class="order-summary">
            <h3>Order Summary</h3>
            <div class="order-summary__row">
              <span>Subtotal</span><span id="subtotal">$0.00</span>
            </div>
            <div class="order-summary__row">
              <span>Tax (6%)</span><span id="tax">$0.00</span>
            </div>
            <div class="order-summary__row">
              <span>Shipping</span><span id="shipping">$0.00</span>
            </div>
            <div class="order-summary__row order-summary__total">
              <span>Order Total</span><span id="order-total">$0.00</span>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
