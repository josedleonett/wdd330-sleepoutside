<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header id="main-header" class="divider"></header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <section class="category-list">
        <h2>Shop by Category</h2>
        <ul>
          <li>
            <a href="/product_listing/index.html?category=tents">
              <img
                src="https://byui-cse.github.io/wdd330-ww-course/images/category-tents.svg"
                alt="Tents"
              />
              <h3>Tents</h3>
            </a>
          </li>
          <li>
            <a href="/product_listing/index.html?category=backpacks">
              <img
                src="https://byui-cse.github.io/wdd330-ww-course/images/category-backpacks.svg"
                alt="Backpacks"
              />
              <h3>Backpacks</h3>
            </a>
          </li>
          <li>
            <a href="/product_listing/index.html?category=sleeping-bags">
              <img
                src="https://byui-cse.github.io/wdd330-ww-course/images/category-sleepingbags.svg"
                alt="Sleeping Bags"
              />
              <h3>Sleeping Bags</h3>
            </a>
          </li>
          <li>
            <a href="/product_listing/index.html?category=hammocks">
              <img
                src="https://byui-cse.github.io/wdd330-ww-course/images/category-hammocks.svg"
                alt="Hammocks"
              />
              <h3>Hammocks</h3>
            </a>
          </li>
        </ul>
      </section>
    </main>
    <footer id="main-footer"></footer>
    <div id="asset-preload" style="display: none">
      <img
        src="/images/tents/cedar-ridge-rimrock-tent-2-person-3-season-in-rust-clay~p~344yj_01~320.jpg"
        alt=""
      />
      <img
        src="/images/tents/marmot-ajax-tent-3-person-3-season-in-pale-pumpkin-terracotta~p~880rr_01~320.jpg"
        alt=""
      />
      <img
        src="/images/tents/the-north-face-alpine-guide-tent-3-person-4-season-in-canary-yellow-high-rise-grey~p~985pr_01~320.jpg"
        alt=""
      />
      <img
        src="/images/tents/the-north-face-talus-tent-4-person-3-season-in-golden-oak-saffron-yellow~p~985rf_01~320.jpg"
        alt=""
      />
      <img src="/images/logos/marmot-160x100.jpg" alt="" />
    </div>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
